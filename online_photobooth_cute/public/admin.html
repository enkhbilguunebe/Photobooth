<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheezy Fixed Codes</title>
  <style>
    :root{--ink:#160d0d;--cream:#fff8ea;--blue:#a9dcf7}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;background:linear-gradient(rgba(20,0,0,.48),rgba(20,0,0,.78)),url("/assets/red-curtain.png");background-size:cover;background-position:center;color:var(--ink);padding:28px}
    .wrap{max-width:760px;margin:0 auto}
    header{color:var(--cream);margin-bottom:18px}
    h1{margin:0;font-size:34px;letter-spacing:-.04em}
    p{margin:6px 0 0;color:#eadbc8;font-weight:800}
    .card{background:var(--cream);border-radius:24px;padding:20px;box-shadow:0 22px 70px rgba(0,0,0,.4)}
    .codes{display:grid;gap:12px}
    .code{display:flex;justify-content:space-between;align-items:center;gap:14px;border:2px solid #111;border-radius:20px;background:#fff;padding:16px;box-shadow:5px 5px 0 rgba(0,0,0,.18)}
    .num{font-size:34px;letter-spacing:.14em;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .status{font-weight:950;border-radius:999px;padding:8px 12px;background:#dff7e8;color:#10734b}
    .used{opacity:.48}
    .used .status{background:#eee;color:#555}
    button{border:2px solid #111;border-radius:999px;padding:10px 14px;background:var(--blue);font-weight:950;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Cheezy Redeem Codes</h1>
      <p>These are the only 3 codes. Each gives 3 tokens and works once until the server restarts.</p>
    </header>
    <section class="card">
      <div id="codes" class="codes">Loading…</div>
    </section>
  </div>

  <script>
    async function loadCodes() {
      const res = await fetch("/api/admin/codes", { cache: "no-store" });
      const data = await res.json();
      document.getElementById("codes").innerHTML = (data.codes || []).map(c => `
        <div class="code ${c.used ? "used" : ""}">
          <span class="num">${c.code}</span>
          <span class="status">${c.used ? "Used" : "+3 tokens"}</span>
          <button onclick="navigator.clipboard.writeText('${c.code}')">Copy</button>
        </div>
      `).join("");
    }
    loadCodes();
    setInterval(loadCodes, 5000);
  </script>
</body>
</html>
