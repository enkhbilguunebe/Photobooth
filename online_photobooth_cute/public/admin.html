<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheezy Admin Codes</title>
  <style>
    :root{--ink:#160d0d;--cream:#fff8ea;--blue:#a9dcf7;--red:#9a0f24}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;background:linear-gradient(rgba(20,0,0,.48),rgba(20,0,0,.78)),url("/assets/red-curtain.png");background-size:cover;background-position:center;color:var(--ink);padding:28px}
    .wrap{max-width:900px;margin:0 auto}
    header{display:flex;justify-content:space-between;gap:16px;align-items:center;color:var(--cream);margin-bottom:18px}
    h1{margin:0;font-size:34px;letter-spacing:-.04em}
    p{margin:6px 0 0;color:#eadbc8;font-weight:800}
    button{border:2px solid #111;border-radius:999px;padding:13px 18px;background:var(--blue);color:#061723;font-weight:950;cursor:pointer;box-shadow:5px 5px 0 #000}
    .card{background:var(--cream);border-radius:24px;padding:20px;box-shadow:0 22px 70px rgba(0,0,0,.4)}
    .code-big{font-size:54px;letter-spacing:.12em;font-weight:950;text-align:center;margin:18px 0;padding:18px;border:3px dashed #111;border-radius:20px;background:#fff}
    table{width:100%;border-collapse:collapse;margin-top:18px}
    th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(0,0,0,.12);font-weight:850}
    th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#7a3c23}
    .used{opacity:.5;text-decoration:line-through}
    .pill{display:inline-block;border-radius:999px;padding:6px 10px;background:#fff;border:1px solid rgba(0,0,0,.15);font-weight:950}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Cheezy Redeem Codes</h1>
        <p>Generate a 6 digit code. Each code gives 5 tokens and can be used once.</p>
      </div>
      <button id="createBtn">Create 6 digit code</button>
    </header>

    <section class="card">
      <div id="latest" class="code-big">------</div>
      <button id="copyBtn">Copy latest code</button>

      <table>
        <thead><tr><th>Code</th><th>Tokens</th><th>Status</th><th>Created</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>

  <script>
    const latest = document.getElementById("latest");
    const rows = document.getElementById("rows");
    const createBtn = document.getElementById("createBtn");
    const copyBtn = document.getElementById("copyBtn");
    let latestCode = "";

    async function loadCodes() {
      const res = await fetch("/api/admin/codes", { cache: "no-store" });
      const data = await res.json();
      const codes = data.codes || [];
      rows.innerHTML = codes.length ? codes.map(c => `
        <tr class="${c.used ? "used" : ""}">
          <td><span class="pill">${c.code}</span></td>
          <td>${c.tokens}</td>
          <td>${c.used ? "Used" : "Available"}</td>
          <td>${new Date(c.createdAt).toLocaleString()}</td>
        </tr>
      `).join("") : `<tr><td colspan="4">No codes yet.</td></tr>`;
    }

    createBtn.onclick = async () => {
      const res = await fetch("/api/admin/create-code", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
      const data = await res.json();
      latestCode = data.code;
      latest.textContent = latestCode;
      await loadCodes();
    };

    copyBtn.onclick = async () => {
      if (!latestCode) return;
      await navigator.clipboard.writeText(latestCode);
      copyBtn.textContent = "Copied";
      setTimeout(() => copyBtn.textContent = "Copy latest code", 1200);
    };

    loadCodes();
    setInterval(loadCodes, 5000);
  </script>
</body>
</html>
